name: WO Sync Resources

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    name: Sync Resources
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read config
        id: config
        shell: pwsh
        run: |
          $configFile = "workload-orchestration.yaml"
          if (-not (Test-Path $configFile)) {
            Write-Error "No workload-orchestration.yaml found in repository root"
            exit 1
          }

          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -ErrorAction SilentlyContinue
          $config = Get-Content $configFile -Raw | ConvertFrom-Yaml

          echo "rg=$($config.resourceGroup)" >> $env:GITHUB_OUTPUT
          echo "template_file=$(if ($config.templateFile) { $config.templateFile } else { './workload-orchestration/main.bicep' })" >> $env:GITHUB_OUTPUT
          echo "deny_mode=$(if ($config.denySettingsMode) { $config.denySettingsMode } else { 'none' })" >> $env:GITHUB_OUTPUT
          $excludedActions = if ($config.denySettingsExcludedActions) { $config.denySettingsExcludedActions -join ',' } else { '' }
          echo "deny_excluded_actions=$excludedActions" >> $env:GITHUB_OUTPUT
          echo "unmanage_resources=$(if ($config.actionOnUnmanageResources) { $config.actionOnUnmanageResources } else { 'detach' })" >> $env:GITHUB_OUTPUT
          echo "unmanage_rgs=$(if ($config.actionOnUnmanageResourceGroups) { $config.actionOnUnmanageResourceGroups } else { 'detach' })" >> $env:GITHUB_OUTPUT

          Write-Output "Config loaded:"
          Get-Content $configFile

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync via Deployment Stack
        uses: azure/bicep-deploy@v2
        with:
          type: deploymentStack
          operation: create
          name: workload-orchestration-stack
          scope: resourceGroup
          resource-group-name: ${{ steps.config.outputs.rg }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          template-file: ${{ steps.config.outputs.template_file }}
          action-on-unmanage-resources: ${{ steps.config.outputs.unmanage_resources }}
          action-on-unmanage-resourcegroups: ${{ steps.config.outputs.unmanage_rgs }}
          deny-settings-mode: ${{ steps.config.outputs.deny_mode }}
          deny-settings-excluded-actions: ${{ steps.config.outputs.deny_excluded_actions }}