name: WO Sync Resources

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    name: Sync Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read config
        id: config
        run: |
          config_file="workload-orchestration.yaml"
          if [ ! -f "$config_file" ]; then
            echo "::error::No workload-orchestration.yaml found in repository root"
            exit 1
          fi

          echo "rg=$(yq -r '.resourceGroup' "$config_file")" >> "$GITHUB_OUTPUT"
          echo "template_file=$(yq -r '.templateFile // "./workload-orchestration/main.bicep"' "$config_file")" >> "$GITHUB_OUTPUT"
          echo "deny_mode=$(yq -r '.denySettingsMode // "none"' "$config_file")" >> "$GITHUB_OUTPUT"
          echo "deny_excluded_actions=$(yq -r '(.denySettingsExcludedActions // []) | join(",")' "$config_file")" >> "$GITHUB_OUTPUT"
          echo "unmanage_resources=$(yq -r '.actionOnUnmanageResources // "detach"' "$config_file")" >> "$GITHUB_OUTPUT"
          echo "unmanage_rgs=$(yq -r '.actionOnUnmanageResourceGroups // "detach"' "$config_file")" >> "$GITHUB_OUTPUT"

          echo "Config loaded:"
          cat "$config_file"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync via Deployment Stack
        uses: azure/bicep-deploy@v2
        with:
          type: deploymentStack
          operation: create
          name: workload-orchestration-stack
          scope: resourceGroup
          resource-group-name: ${{ steps.config.outputs.rg }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          template-file: ${{ steps.config.outputs.template_file }}
          action-on-unmanage-resources: ${{ steps.config.outputs.unmanage_resources }}
          action-on-unmanage-resourcegroups: ${{ steps.config.outputs.unmanage_rgs }}
          deny-settings-mode: ${{ steps.config.outputs.deny_mode }}
          deny-settings-excluded-actions: ${{ steps.config.outputs.deny_excluded_actions }}