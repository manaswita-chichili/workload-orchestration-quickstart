name: WO Validate

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Bicep
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read config
        id: config
        shell: pwsh
        run: |
          $configFile = "workload-orchestration.yaml"
          if (-not (Test-Path $configFile)) {
            Write-Error "No workload-orchestration.yaml found in repository root"
            exit 1
          }

          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -ErrorAction SilentlyContinue
          $config = Get-Content $configFile -Raw | ConvertFrom-Yaml

          echo "rg=$($config.resourceGroup)" >> $env:GITHUB_OUTPUT
          echo "template_file=$(if ($config.templateFile) { $config.templateFile } else { './workload-orchestration/main.bicep' })" >> $env:GITHUB_OUTPUT
          echo "deny_mode=$(if ($config.denySettingsMode) { $config.denySettingsMode } else { 'none' })" >> $env:GITHUB_OUTPUT
          $excludedActions = if ($config.denySettingsExcludedActions) { $config.denySettingsExcludedActions -join ',' } else { '' }
          echo "deny_excluded_actions=$excludedActions" >> $env:GITHUB_OUTPUT
          Write-Output "Config loaded:"
          Get-Content $configFile

      - name: Azure login
        shell: pwsh
        run: |
          az login --identity --client-id "e83cfba2-9f60-40cf-b9de-06a2bf3f1d7c"
          az account set --subscription "973d15c6-6c57-447e-b9c6-6d79b5b784ab"
          az account show -o table

      - name: Validate Bicep templates
        id: validate
        shell: pwsh
        run: |
          az deployment group what-if `
            --resource-group ${{ steps.config.outputs.rg }} `
            --template-file ${{ steps.config.outputs.template_file }}

      - name: Comment validation result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.validate.outcome }}';
            const icon = status === 'success' ? '\u2705' : '\u274C';
            const body = `${icon} **Bicep Validation: ${status}**\n\n` +
              `- **Template:** \`${{ steps.config.outputs.template_file }}\`\n` +
              `- **Stack:** \`workload-orchestration-stack\`\n` +
              `- **Resource Group:** \`${{ steps.config.outputs.rg }}\`\n\n` +
              `> See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });